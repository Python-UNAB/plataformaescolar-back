services:
  - type: web
    name: plataformaescolar-api
    runtime: node
    buildCommand: npm ci && npx prisma generate && npx prisma migrate deploy && npx prisma db seed && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: DATABASE_URL
        sync: false # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "24h"
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false # Set to your frontend URL, e.g. https://your-frontend.onrender.com
